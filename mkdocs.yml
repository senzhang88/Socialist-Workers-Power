# 主题配置
theme:
  name: material
  language: zh
  custom_dir: overrides
  logo: assets/logo.jpg
  favicon: assets/logo.jpg
  palette:
    # 浅色模式（默认 - 与 Stitch 设计对齐）
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 切换到深色模式
    # 深色模式
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  font:
    text: Inter
    code: JetBrains Mono

# 插件
plugins:
  - search:
      lang: zh
      separator: '[\s\u200b\-]'
  # SEO优化：meta描述（暂时禁用，兼容性问题）
  # - meta-descriptions:
  # SEO优化：社交分享卡片（需要 cairosvg/pillow，暂时禁用）
  # - social:
  #     cards: true
  # HTML压缩
  - minify:
      minify_html: true

# 自定义 CSS
extra_css:
  - stylesheets/extra.css

# 额外JavaScript（百度统计等）
extra_javascript:
  - javascripts/baidu-analytics.js

# 额外功能
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/senzhang88/Socialist-Workers-Power
    - icon: fontawesome/regular/envelope
      link: mailto:zhsheshhh@gmail.com
      name: 联系我们
  generator: false
  
  # 百度验证代码占位符（需要在百度站长平台获取）
  # 百度站长平台: https://ziyuan.baidu.com
  baidu_verification: "YOUR_BAIDU_VERIFICATION_CODE"
  baidu_hm: "YOUR_BAIDU_HM_CODE"

# Markdown 扩展
markdown_extensions:
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

